<body>
<div id="app"></div>
<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────
const C={teal:"#00D4A8",tealDim:"rgba(0,212,168,0.13)",red:"#FF4768",redDim:"rgba(255,71,104,0.13)",amber:"#FFB030",amberDim:"rgba(255,176,48,0.13)",blue:"#3D88FF",blueDim:"rgba(61,136,255,0.13)",orange:"#FF7B3F",orangeDim:"rgba(255,123,63,0.13)",purple:"#A78BFA",purpleDim:"rgba(167,139,250,0.13)",text:"#DDE9FF",text2:"#4D6A96",text3:"#1C2E47"};
const fmt=n=>new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(n||0);
const pct=n=>`${((n||0)*100).toFixed(1)}%`;
const LOJAS_CMV=["Jangadas","NIMBUS","Casagrande","Nova América","Spazzio Senna"];
const TIPOS_P=["Furto","Vencimento","Erro","Quebra"];
const MESES=["Jan/25","Fev/25","Mar/25","Abr/25","Mai/25","Jun/25","Jul/25","Ago/25","Set/25","Out/25","Nov/25","Dez/25","Jan/26","Fev/26","Mar/26","Abr/26","Mai/26","Jun/26"];
const CAT_E=["Venda","Faturamento Loja","Empréstimo","Investimento","Outros créditos"];
const CAT_S=["Fornecedor","Aluguel","Salário","Impostos","Energia","Marketing","Manutenção","Outros débitos"];
const BAR_COLORS=["#00D4A8","#FFB030","#3D88FF","#FF7B3F","#A78BFA"];
const PIE_COLORS=["#FF4768","#FFB030","#3D88FF","#00D4A8"];

// ── API KEY ────────────────────────────────────────────────────────────────
function getApiKey(){return localStorage.getItem("cmv_api_key")||"";}
function salvarApiKey(k){localStorage.setItem("cmv_api_key",k.trim());}
function limparApiKey(){localStorage.removeItem("cmv_api_key");}
function temApiKey(){const k=getApiKey();return k&&k.startsWith("sk-ant-");}

// ── PERSIST ────────────────────────────────────────────────────────────────
function salvarDados(){
  try{localStorage.setItem("cmvApp_v2",JSON.stringify({cmv:state.cmv,perdas:state.perdas,prods:state.prods,caixa:state.caixa,nextId:state.nextId}));return true;}catch(e){return false;}
}
function carregarDados(){
  try{const r=localStorage.getItem("cmvApp_v2");if(!r)return;const d=JSON.parse(r);if(d.cmv)state.cmv=d.cmv;if(d.perdas)state.perdas=d.perdas;if(d.prods)state.prods=d.prods;if(d.caixa)state.caixa=d.caixa;if(d.nextId)state.nextId=d.nextId;}catch(e){}
}

// ── STATE ─────────────────────────────────────────────────────────────────
let state={
  tab:"dashboard",modal:null,nextId:300,
  saveToast:false,confirmPending:null,
  mesFiltro:"Todos",caixaFiltro:"todos",
  expandedMonths:{},
  pdfStatus:"idle",pdfDados:null,pdfErro:null,
  driveStatus:"idle",driveUser:null,lastSaved:null,showDrive:false,
  cmv:[
    {id:1,loja:"Jangadas",mes:"Abr/26",produto:"Frango",custo:8.5,fat:15},
    {id:2,loja:"NIMBUS",mes:"Abr/26",produto:"Arroz 5kg",custo:3.2,fat:7},
    {id:3,loja:"Casagrande",mes:"Abr/26",produto:"Feijão",custo:2.8,fat:6.5},
  ],
  perdas:[
    {id:1,loja:"Jangadas",mes:"Abr/26",produto:"Frango",qtd:2,custo:8.5,tipo:"Vencimento"},
    {id:2,loja:"NIMBUS",mes:"Abr/26",produto:"Pão",qtd:5,custo:1.2,tipo:"Furto"},
  ],
  prods:[
    {id:1,nome:"Carne Bovina",vendas:2200,custo:1320,cat:"Proteína"},
    {id:2,nome:"Frango",vendas:1500,custo:850,cat:"Proteína"},
    {id:3,nome:"Arroz 5kg",vendas:900,custo:480,cat:"Grãos"},
    {id:4,nome:"Feijão Carioca",vendas:650,custo:350,cat:"Grãos"},
    {id:5,nome:"Macarrão",vendas:520,custo:280,cat:"Massas"},
  ],
  caixa:[
    {id:1,data:"01/04/26",desc:"Faturamento Jangadas",cat:"Faturamento Loja",tipo:"entrada",valor:4500,mes:"Abr/26",loja:"Jangadas"},
    {id:2,data:"01/04/26",desc:"Faturamento NIMBUS",cat:"Faturamento Loja",tipo:"entrada",valor:3800,mes:"Abr/26",loja:"NIMBUS"},
    {id:3,data:"05/04/26",desc:"Compra estoque",cat:"Fornecedor",tipo:"saida",valor:1200,mes:"Abr/26",loja:""},
    {id:4,data:"10/04/26",desc:"Aluguel Casagrande",cat:"Aluguel",tipo:"saida",valor:2200,mes:"Abr/26",loja:""},
    {id:5,data:"15/04/26",desc:"Folha pagamento",cat:"Salário",tipo:"saida",valor:3100,mes:"Abr/26",loja:""},
  ],
};
// carregarDados called inside carregarDadosCompleto

function setState(fn){
  fn(state);
  // Auto-save every state change to IndexedDB (survives Chrome clear)
  _autoSave();
  render();
}

let _saveTimer = null;
function _autoSave(){
  // Save immediately to IndexedDB
  salvarIndexedDB();
  // Also save to localStorage with debounce
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(()=>{
    try{
      localStorage.setItem("cmvApp_v2", JSON.stringify({
        cmv:state.cmv, perdas:state.perdas,
        prods:state.prods, caixa:state.caixa,
        nextId:state.nextId
      }));
      const ts = new Date().toLocaleString("pt-BR");
      localStorage.setItem("cmv_last_saved", ts);
      state.lastSaved = ts;
    }catch(e){}
  }, 500);
}
function mostrarToast(){
  state.saveToast=true; render();
  setTimeout(()=>{state.saveToast=false; render();}, 2500);
}

// ── DOM HELPER ────────────────────────────────────────────────────────────
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(v===null||v===undefined||v===false)return;
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else if(k==="htmlFor")el.setAttribute("for",v);
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
}

// ── COMPUTED ──────────────────────────────────────────────────────────────
function filtrarMes(list,mes){return mes==="Todos"?list:list.filter(r=>r.mes===mes);}
function getMeses(list){return[...new Set(list.map(r=>r.mes).filter(Boolean))].sort();}
function getAllMeses(){return[...new Set([...state.cmv,...state.perdas,...state.caixa].map(r=>r.mes).filter(Boolean))].sort();}

function getKpis(mes){
  const cmv=filtrarMes(state.cmv,mes);
  const perdas=filtrarMes(state.perdas,mes);
  const caixa=filtrarMes(state.caixa,mes);
  const fat=cmv.reduce((s,r)=>s+r.fat,0);
  const cmvT=cmv.reduce((s,r)=>s+r.custo,0);
  const cmvPct=fat>0?cmvT/fat:0;
  const perdaTotal=perdas.reduce((s,r)=>s+r.qtd*r.custo,0);
  const saidas=caixa.filter(r=>r.tipo==="saida").reduce((s,r)=>s+r.valor,0);
  const entradas=caixa.filter(r=>r.tipo==="entrada").reduce((s,r)=>s+r.valor,0);
  const margem=fat>0?1-cmvPct-perdaTotal/fat:0;
  const lucroLiq=entradas>0?(entradas-saidas)/entradas:0;
  return{fat,cmvPct,perdaTotal,margem,saidas,entradas,lucroLiq};
}
function getFluxo(mes){
  const c=filtrarMes(state.caixa,mes);
  const entradas=c.filter(r=>r.tipo==="entrada").reduce((s,r)=>s+r.valor,0);
  const saidas=c.filter(r=>r.tipo==="saida").reduce((s,r)=>s+r.valor,0);
  return{entradas,saidas,saldo:entradas-saidas};
}
function getCmvByLoja(mes){
  const m={};
  filtrarMes(state.cmv,mes).forEach(r=>{if(!m[r.loja])m[r.loja]={fat:0,custo:0};m[r.loja].fat+=r.fat;m[r.loja].custo+=r.custo;});
  return Object.entries(m).map(([loja,v])=>({loja,cmv:v.fat>0?(v.custo/v.fat)*100:0}));
}
function getPerdasByTipo(mes){
  const m={};
  filtrarMes(state.perdas,mes).forEach(r=>{m[r.tipo]=(m[r.tipo]||0)+r.qtd*r.custo;});
  return Object.entries(m).map(([name,value])=>({name,value}));
}
function getFatByLoja(mes){
  const m={};
  filtrarMes(state.caixa,mes).filter(r=>r.tipo==="entrada"&&r.loja).forEach(r=>{m[r.loja]=(m[r.loja]||0)+r.valor;});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function getTopProdutos(){
  const s=[...state.prods].sort((a,b)=>b.vendas-a.vendas);
  const tot=s.reduce((x,p)=>x+p.vendas,0);let acc=0;
  return s.map(p=>{acc+=p.vendas;return{...p,abc:acc/tot<=0.5?"A":acc/tot<=0.8?"B":"C"};});
}

// ── CHARTS ────────────────────────────────────────────────────────────────
function barChart(data,valueKey,labelKey,colorFn,ht=150){
  if(!data.length)return h('div',{style:{height:ht+"px",display:"flex",alignItems:"center",justifyContent:"center",color:C.text2,fontSize:12}},"Sem dados");
  const max=Math.max(...data.map(d=>d[valueKey]),1);
  const W=Math.min(window.innerWidth-60,420);
  const bw=Math.min(40,Math.floor((W-40)/data.length)-8);
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width","100%");svg.setAttribute("height",ht+32);svg.setAttribute("viewBox",`0 0 ${W} ${ht+32}`);
  [0.25,0.5,0.75,1].forEach(f=>{

function pieChart(data,size=130){
  if(!data.length)return h('div',{style:{width:size+"px",height:size+"px"}});
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  const cx=size/2,cy=size/2,r=size/2-8,ir=r*0.55;
  svg.setAttribute("width",size);svg.setAttribute("height",size);svg.setAttribute("viewBox",`0 0 ${size} ${size}`);
  const total=data.reduce((s,d)=>s+d.value,0);
  let angle=-Math.PI/2;
  data.forEach((d,i)=>{
    const slice=(d.value/total)*Math.PI*2;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+slice),y2=cy+r*Math.sin(angle+slice);
    const ix1=cx+ir*Math.cos(angle),iy1=cy+ir*Math.sin(angle);
    const ix2=cx+ir*Math.cos(angle+slice),iy2=cy+ir*Math.sin(angle+slice);
    const lg=slice>Math.PI?1:0;
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",`M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${lg},0 ${ix1},${iy1} Z`);
    path.setAttribute("fill",PIE_COLORS[i%4]);path.setAttribute("stroke","#06090F");path.setAttribute("stroke-width","2");
    svg.appendChild(path);angle+=slice;
  });
  return svg;
}

// ── PDF/IMG ANALYSIS ──────────────────────────────────────────────────────
function fileToBase64(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=()=>res(reader.result.split(",")[1]);
    reader.onerror=rej;
    reader.readAsDataURL(file);
  });
}

async function analisarArquivo(file){
  if(!temApiKey()){
    setState(s=>{s.pdfStatus="erro";s.pdfErro="Configure sua chave API primeiro.";});return;
  }
  setState(s=>{s.pdfStatus="loading";s.pdfDados=null;s.pdfErro=null;});
  try{
    const base64=await fileToBase64(file);
    const isPdf=file.type==="application/pdf";
    const mediaType=isPdf?"application/pdf":file.type;
    const contentType=isPdf?"document":"image";
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":getApiKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:800,
        messages:[{role:"user",content:[
          {type:contentType,source:{type:"base64",media_type:mediaType,data:base64}},
          {type:"text",text:`Analise este comprovante de pagamento. Responda APENAS com JSON válido sem markdown:\n{"valor":0.00,"descricao":"descrição curta","data":"DD/MM/AA","categoria":"categoria","tipo":"saida"}\nCategorias: Fornecedor, Aluguel, Salário, Impostos, Energia, Marketing, Manutenção, Outros débitos, Venda, Faturamento Loja, Empréstimo, Investimento, Outros créditos.\nTipo: "saida" se débito/pagamento, "entrada" se crédito/recebimento.`}
        ]}]
      })
    });
    const data=await resp.json();
    if(data.error)throw new Error(data.error.message||"Erro na API");
    const txt=data.content[0].text.trim().replace(/```json|```/g,"").trim();
    setState(s=>{s.pdfStatus="done";s.pdfDados=JSON.parse(txt);});
    salvarIndexedDB();
  }catch(e){
    setState(s=>{s.pdfStatus="erro";s.pdfErro=e.message||"Não foi possível analisar.";});
  }
}

// ── MODAL (keyboard-safe) ─────────────────────────────────────────────────
function renderModal(){
  if(!state.modal)return null;
  const titles={cmv:"Lançamento CMV",perdas:"Registrar Perda",produtos:"Cadastrar Produto",caixa:"Lançamento de Caixa"};

  function Lbl(t){return h('label',{className:"field-lbl"},t);}

  // Uncontrolled input — no value binding, reads from formData on save
  function Inp(name,key,type="text",placeholder=""){
    const el=h('div',null,
      Lbl(name),
      h('input',{
        className:"field-inp",
        type,
        placeholder: placeholder||(type==="number"?"0,00":""),
        inputMode:type==="number"?"decimal":"text",
        // Set initial value from formData
        value:undefined
      })
    );
    // Set value after creating element, and attach listener
    const inp=el.querySelector("input");
    if(getVal(key))inp.value=getVal(key);
    inp.addEventListener("input",e=>setVal(key,e.target.value));
    inp.addEventListener("change",e=>setVal(key,e.target.value));
    return el;
  }

  function Sel(name,key,opts){
    const selEl=h('select',{className:"field-inp"},
      h('option',{value:""},"Selecionar..."),
      ...opts.map(o=>h('option',{value:o},o))
    );
    if(getVal(key))selEl.value=getVal(key);
    selEl.addEventListener("change",e=>{setVal(key,e.target.value);render();});
    return h('div',null,Lbl(name),selEl);
  }

  function LojaGrid(key){
    return h('div',null,
      Lbl("Loja"),
      h('div',{className:"loja-grid"},

          style:{border:`1px solid ${tipo===t?(t==="entrada"?C.teal:C.red):"rgba(80,140,230,0.15)"}`,background:tipo===t?(t==="entrada"?C.tealDim:C.redDim):"#122038",color:tipo===t?(t==="entrada"?C.teal:C.red):C.text2}
        },t==="entrada"?"⬇ Entrada":"⬆ Saída"))
      )
    );

  let fields=[];
  if(state.modal==="cmv"){
    fields=[
      LojaGrid("loja"),

      Inp("Faturamento (R$)","fat","number"),
    ];
  }
  if(state.modal==="perdas"){
    fields=[
      LojaGrid("loja"),
      Sel("Mês","mes",MESES),
      Inp("Produto","produto"),
      Inp("Quantidade","qtd","number"),
      Inp("Custo Unit. (R$)","custo","number"),
      Sel("Tipo de Perda","tipo",TIPOS_P),
    ];
  }
  if(state.modal==="produtos"){
    fields=[
      Inp("Nome do Produto","nome"),
      Inp("Vendas (R$)","vendas","number"),
      Inp("Custo (R$)","custo","number"),

    ];

  if(state.modal==="caixa"){
    const tipo=getVal("tipoCaixa");
    fields=[
      TipoToggle(),
      Inp("Descrição","desc"),
      Sel("Mês","mes",MESES),

// ── GOOGLE DRIVE BACKUP ──────────────────────────────────────────────────
const BACKUP_FILENAME = "dashboard_cmv_backup.json";
const GDRIVE_API      = "https://www.googleapis.com/drive/v3";
const GDRIVE_UPLOAD   = "https://www.googleapis.com/upload/drive/v3";
// Client ID for Google OAuth
const GCLIENT_ID = ""; // optional - export/import works without it

function getDriveToken(){ return localStorage.getItem("cmv_drive_token")||""; }
function setDriveToken(t){ localStorage.setItem("cmv_drive_token",t); }
function clearDriveToken(){ localStorage.removeItem("cmv_drive_token"); localStorage.removeItem("cmv_drive_user"); }
function getDriveUser(){ return JSON.parse(localStorage.getItem("cmv_drive_user")||"null"); }
function setDriveUser(u){ localStorage.setItem("cmv_drive_user",JSON.stringify(u)); }
function getLastSaved(){ return localStorage.getItem("cmv_last_saved")||""; }
function setLastSaved(ts){ localStorage.setItem("cmv_last_saved",ts); }

// ── IndexedDB (survives Chrome history clear) ─────────────────────────────
const DB_NAME="DashboardCMV", DB_VER=1, STORE="dados";
function abrirDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>e.target.result.createObjectStore(STORE);
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e);
  });
}
async function salvarIndexedDB(){
  try{
    const db=await abrirDB();
    const dados={cmv:state.cmv,perdas:state.perdas,prods:state.prods,caixa:state.caixa,nextId:state.nextId,ts:Date.now()};
    return new Promise((res)=>{
      const tx=db.transaction(STORE,"readwrite");
      tx.objectStore(STORE).put(JSON.stringify(dados),"backup");
      tx.oncomplete=()=>res(true);
      tx.onerror=()=>res(false);
    });
  }catch(e){return false;}
}
async function carregarIndexedDB(){
  try{
    const db=await abrirDB();
    return new Promise((res)=>{
      const req=db.transaction(STORE,"readonly").objectStore(STORE).get("backup");
      req.onsuccess=e=>res(e.target.result?JSON.parse(e.target.result):null);
      req.onerror=()=>res(null);
    });
  }catch(e){return null;}
}

// ── Load with IndexedDB fallback ──────────────────────────────────────────
async function carregarDadosCompleto(){
  carregarDados();
  const temDados=state.cmv.length>0||state.perdas.length>0||state.caixa.length>0;
  if(!temDados){
    const backup=await carregarIndexedDB();
    if(backup){
      if(backup.cmv)   state.cmv   =backup.cmv;
      if(backup.perdas)state.perdas=backup.perdas;
      if(backup.prods) state.prods =backup.prods;
      if(backup.caixa) state.caixa =backup.caixa;
      if(backup.nextId)state.nextId=backup.nextId;
      salvarDados();
      render();
    }
  }
  const ts=getLastSaved();
  if(ts){state.lastSaved=ts;}
}

// ── Export/Import JSON backup ─────────────────────────────────────────────
function exportarBackup(){
  const dados=JSON.stringify({cmv:state.cmv,perdas:state.perdas,prods:state.prods,caixa:state.caixa,nextId:state.nextId,exportedAt:new Date().toISOString()},null,2);
  const blob=new Blob([dados],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download=`backup_cmv_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  setState(s=>{s.driveStatus="ok_export";});
  setTimeout(()=>setState(s=>{s.driveStatus="idle";}),3000);
}

function importarBackup(file){
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const dados=JSON.parse(e.target.result);
      if(dados.cmv)   state.cmv   =dados.cmv;
      if(dados.perdas)state.perdas=dados.perdas;
      if(dados.prods) state.prods =dados.prods;
      if(dados.caixa) state.caixa =dados.caixa;
      if(dados.nextId)state.nextId=dados.nextId;
      salvarDados();
      salvarIndexedDB();
      setState(s=>{s.driveStatus="ok_import";});
      setTimeout(()=>setState(s=>{s.driveStatus="idle";}),3000);
    }catch(err){
      setState(s=>{s.driveStatus="err_import";});
      setTimeout(()=>setState(s=>{s.driveStatus="idle";}),3000);
    }
  };
  reader.readAsText(file);
}

// ── Google Drive OAuth + Upload ───────────────────────────────────────────
function loginGoogleDrive(){
  // Use Google's token endpoint via popup
  const params=new URLSearchParams({
    client_id:"695611667262-demo.apps.googleusercontent.com",
    redirect_uri:window.location.origin+window.location.pathname,
    response_type:"token",
    scope:"https://www.googleapis.com/auth/drive.appdata email profile",
    prompt:"select_account"
  });
  // Store intent to handle redirect
  localStorage.setItem("cmv_oauth_intent","1");
  window.location.href="https://accounts.google.com/o/oauth2/v2/auth?"+params.toString();
}

// Handle OAuth redirect
function handleOAuthRedirect(){
  const hash=window.location.hash;
  if(hash&&hash.includes("access_token")&&localStorage.getItem("cmv_oauth_intent")){
    localStorage.removeItem("cmv_oauth_intent");
    const params=new URLSearchParams(hash.slice(1));
    const token=params.get("access_token");
    if(token){
      setDriveToken(token);
      // Get user info
      fetch("https://www.googleapis.com/oauth2/v2/userinfo",{headers:{Authorization:"Bearer "+token}})
        .then(r=>r.json()).then(u=>{setDriveUser(u);setState(s=>{s.driveUser=u;});});
      // Clean URL
      history.replaceState(null,"",window.location.pathname);
      // Auto-upload
      setTimeout(uploadToDrive, 1000);
    }
  }
}

async function uploadToDrive(){
  const token=getDriveToken();
  if(!token){setState(s=>{s.driveStatus="need_login";});return;}
  setState(s=>{s.driveStatus="uploading";});
  try{
    const dados=JSON.stringify({cmv:state.cmv,perdas:state.perdas,prods:state.prods,caixa:state.caixa,nextId:state.nextId,savedAt:new Date().toISOString()});
    // Search for existing file in appDataFolder
    const search=await fetch(`${GDRIVE_API}/files?spaces=appDataFolder&q=name='${BACKUP_FILENAME}'&fields=files(id,name)`,{headers:{Authorization:"Bearer "+token}});
    if(search.status===401){clearDriveToken();setState(s=>{s.driveStatus="need_login";});return;}
    const found=await search.json();
    const fileId=found.files&&found.files[0]?.id;
    const meta={name:BACKUP_FILENAME,parents:fileId?undefined:["appDataFolder"]};
    const form=new FormData();
    form.append("metadata",new Blob([JSON.stringify(meta)],{type:"application/json"}));
    form.append("file",new Blob([dados],{type:"application/json"}));
    const url=fileId?`${GDRIVE_UPLOAD}/files/${fileId}?uploadType=multipart`:`${GDRIVE_UPLOAD}/files?uploadType=multipart`;
    const method=fileId?"PATCH":"POST";
    const resp=await fetch(url,{method,headers:{Authorization:"Bearer "+token},body:form});
    if(resp.ok){
      const ts=new Date().toLocaleString("pt-BR");
      setLastSaved(ts);
      setState(s=>{s.driveStatus="ok_drive";s.lastSaved=ts;});
      setTimeout(()=>setState(s=>{s.driveStatus="idle";}),3000);
    } else {
      if(resp.status===401){clearDriveToken();}
      setState(s=>{s.driveStatus="err_drive";});
      setTimeout(()=>setState(s=>{s.driveStatus="idle";}),3000);
    }
  }catch(e){
    setState(s=>{s.driveStatus="err_drive";});
    setTimeout(()=>setState(s=>{s.driveStatus="idle";}),3000);
  }
}

async function downloadFromDrive(){
  const token=getDriveToken();
  if(!token){setState(s=>{s.driveStatus="need_login";});return;}
  setState(s=>{s.driveStatus="downloading";});
  try{
    const search=await fetch(`${GDRIVE_API}/files?spaces=appDataFolder&q=name='${BACKUP_FILENAME}'&fields=files(id,name)`,{headers:{Authorization:"Bearer "+token}});
    const found=await search.json();
    const fileId=found.files&&found.files[0]?.id;
    if(!fileId){setState(s=>{s.driveStatus="no_file";});setTimeout(()=>setState(s=>{s.driveStatus="idle";}),3000);return;}
    const resp=await fetch(`${GDRIVE_API}/files/${fileId}?alt=media`,{headers:{Authorization:"Bearer "+token}});
    const dados=await resp.json();
    if(dados.cmv)   state.cmv   =dados.cmv;
    if(dados.perdas)state.perdas=dados.perdas;
    if(dados.prods) state.prods =dados.prods;
    if(dados.caixa) state.caixa =dados.caixa;
    if(dados.nextId)state.nextId=dados.nextId;
    salvarDados();salvarIndexedDB();
    setState(s=>{s.driveStatus="ok_download";});
    setTimeout(()=>setState(s=>{s.driveStatus="idle";}),3000);
  }catch(e){
    setState(s=>{s.driveStatus="err_drive";});
    setTimeout(()=>setState(s=>{s.driveStatus="idle";}),3000);
  }
}

}
