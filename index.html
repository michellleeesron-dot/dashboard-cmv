<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#06090F">
<title>Dashboard CMV</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#06090F;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#DDE9FF;overscroll-behavior:none;}
input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
select{-webkit-appearance:none;appearance:none;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#1C2E47;border-radius:2px;}
.page{padding:14px 13px 92px;display:flex;flex-direction:column;gap:16px;}
.card{background:#0C1523;border:1px solid rgba(80,140,230,0.12);border-radius:16px;}
.lbl{font-size:10px;font-weight:700;letter-spacing:.12em;color:#4D6A96;text-transform:uppercase;margin-bottom:10px;}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.mono{font-family:'Courier New',monospace;}
.hdr{background:#0C1523;border-bottom:1px solid rgba(80,140,230,0.12);padding:14px 16px 12px;position:sticky;top:0;z-index:20;}
.kpi2{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.kpi3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.kpi-card{border-radius:14px;padding:13px 11px;}
.kpi3-item{border-radius:12px;padding:10px 8px;}
.strip{display:flex;gap:7px;}.clear-btn{background:rgba(255,71,104,0.13);border:1px solid rgba(255,71,104,0.25);border-radius:10px;padding:9px 14px;color:#FF4768;font-size:12px;font-weight:700;cursor:pointer;outline:none;white-space:nowrap;}.confirm-box{background:#0C1523;border:1px solid rgba(255,71,104,0.3);border-radius:14px;padding:16px;margin-bottom:4px;display:flex;flex-direction:column;gap:10px;}.confirm-title{font-size:13px;font-weight:600;color:#FF4768;margin-bottom:4px;}.confirm-btns{display:flex;gap:8px;}.confirm-yes{flex:1;padding:11px;background:#FF4768;border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;outline:none;}.confirm-no{flex:1;padding:11px;background:#122038;border:1px solid rgba(80,140,230,0.15);border-radius:10px;color:#4D6A96;font-size:13px;font-weight:700;cursor:pointer;outline:none;}
.strip-item{flex:1;background:#122038;border-radius:12px;padding:9px 8px;border:1px solid rgba(80,140,230,0.1);}
.nav{position:fixed;bottom:0;left:0;right:0;background:#0C1523;border-top:1px solid rgba(80,140,230,0.12);display:flex;z-index:40;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;padding:8px 0 11px;background:transparent;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;outline:none;}
.fab{position:fixed;bottom:74px;right:16px;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#00D4A8,#00A882);border:none;color:#001F18;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:30;box-shadow:0 6px 24px rgba(0,212,168,0.45);font-size:28px;font-weight:300;outline:none;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:50;display:flex;align-items:flex-end;}
.modal{background:#0C1523;border-radius:22px 22px 0 0;width:100%;padding:8px 18px 44px;max-height:90vh;overflow-y:auto;}
.modal-handle{width:38px;height:4px;background:#1C2E47;border-radius:2px;margin:13px auto 18px;}
.field-lbl{font-size:11px;color:#4D6A96;margin-bottom:5px;display:block;font-weight:700;letter-spacing:.05em;text-transform:uppercase;}
input,select{width:100%;background:#122038;border:1px solid rgba(80,140,230,0.15);border-radius:10px;padding:12px 14px;color:#DDE9FF;font-size:15px;outline:none;}
.save-btn{margin-top:20px;width:100%;padding:16px;background:linear-gradient(135deg,#00D4A8,#00A882);border:none;border-radius:14px;color:#001F18;font-size:15px;font-weight:700;cursor:pointer;outline:none;}
.filter-bar{display:flex;gap:6px;margin-bottom:12px;}
.filter-btn{flex:1;padding:10px 4px;border-radius:10px;border:none;cursor:pointer;font-size:11px;font-weight:700;outline:none;}
.tipo-toggle{display:flex;gap:8px;}
.tipo-btn{flex:1;padding:13px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;border:none;outline:none;}
.preview-box{border-radius:10px;padding:12px 14px;}
.del-btn{background:transparent;border:none;color:#1C2E47;cursor:pointer;padding:6px;flex-shrink:0;outline:none;font-size:16px;}
.close-btn{background:#122038;border:1px solid rgba(80,140,230,0.15);border-radius:8px;padding:7px 10px;cursor:pointer;color:#4D6A96;font-size:16px;outline:none;}
.bar-wrap{padding:14px 12px 10px;}
.chart-lbl{font-size:9px;color:#4D6A96;margin-top:4px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.legend-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}
.legend-row{display:flex;align-items:center;gap:5px;font-size:10px;color:#4D6A96;}
.legends{display:flex;gap:14px;justify-content:center;margin-top:8px;flex-wrap:wrap;}
.row-item{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;}
.prog-bg{height:5px;background:#1C2E47;border-radius:3px;overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:3px;}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ── STATE ─────────────────────────────────────────────────────────────────
const C={teal:"#00D4A8",tealDim:"rgba(0,212,168,0.13)",red:"#FF4768",redDim:"rgba(255,71,104,0.13)",amber:"#FFB030",amberDim:"rgba(255,176,48,0.13)",blue:"#3D88FF",blueDim:"rgba(61,136,255,0.13)",orange:"#FF7B3F",orangeDim:"rgba(255,123,63,0.13)",text:"#DDE9FF",text2:"#4D6A96",text3:"#1C2E47"};
const fmt=n=>new Intl.NumberFormat("pt-BR",{style:"currency",currency:"BRL"}).format(n||0);
const pct=n=>`${((n||0)*100).toFixed(1)}%`;
const LOJAS=["Loja A","Loja B","Loja C","Loja D"];
const TIPOS_P=["Furto","Vencimento","Erro","Quebra"];
const MESES=["Jan/25","Fev/25","Mar/25","Abr/25","Mai/25","Jun/25","Jul/25"];
const CAT_E=["Venda","Empréstimo","Investimento","Outros créditos"];
const CAT_S=["Fornecedor","Aluguel","Salário","Impostos","Energia","Marketing","Manutenção","Outros débitos"];
const PIE_COLORS=["#FF4768","#FFB030","#3D88FF","#00D4A8"];
const BAR_COLORS=["#00D4A8","#FFB030","#3D88FF","#FF7B3F","#A78BFA"];

let state={confirmPending:null,
  tab:"dashboard",modal:null,form:{},nextId:300,
  cmv:[{id:1,loja:"Loja A",mes:"Jan/25",produto:"Frango",custo:8.5,fat:15},{id:2,loja:"Loja A",mes:"Jan/25",produto:"Arroz 5kg",custo:3.2,fat:7},{id:3,loja:"Loja B",mes:"Jan/25",produto:"Feijão",custo:2.8,fat:6.5},{id:4,loja:"Loja B",mes:"Fev/25",produto:"Frango",custo:9,fat:16},{id:5,loja:"Loja C",mes:"Fev/25",produto:"Carne Bov.",custo:18,fat:35},{id:6,loja:"Loja C",mes:"Mar/25",produto:"Salmão",custo:22,fat:42},{id:7,loja:"Loja A",mes:"Mar/25",produto:"Ovos",custo:1.5,fat:4.2}],
  perdas:[{id:1,loja:"Loja A",produto:"Frango",qtd:2,custo:8.5,tipo:"Vencimento"},{id:2,loja:"Loja B",produto:"Pão",qtd:5,custo:1.2,tipo:"Furto"},{id:3,loja:"Loja A",produto:"Iogurte",qtd:3,custo:3.5,tipo:"Erro"},{id:4,loja:"Loja C",produto:"Carne",qtd:1,custo:18,tipo:"Quebra"},{id:5,loja:"Loja B",produto:"Leite",qtd:4,custo:2.8,tipo:"Vencimento"}],
  prods:[{id:1,nome:"Carne Bovina",vendas:2200,custo:1320,cat:"Proteína"},{id:2,nome:"Frango",vendas:1500,custo:850,cat:"Proteína"},{id:3,nome:"Arroz 5kg",vendas:900,custo:480,cat:"Grãos"},{id:4,nome:"Leite Integral",vendas:760,custo:420,cat:"Laticínio"},{id:5,nome:"Feijão Carioca",vendas:650,custo:350,cat:"Grãos"},{id:6,nome:"Macarrão",vendas:520,custo:280,cat:"Massas"},{id:7,nome:"Iogurte",vendas:430,custo:250,cat:"Laticínio"},{id:8,nome:"Pão Francês",vendas:380,custo:200,cat:"Padaria"}],
  caixa:[{id:1,data:"03/01/25",desc:"Vendas do dia",cat:"Venda",tipo:"entrada",valor:1850},{id:2,data:"05/01/25",desc:"Pagto fornecedor",cat:"Fornecedor",tipo:"saida",valor:620},{id:3,data:"10/01/25",desc:"Aluguel Loja A",cat:"Aluguel",tipo:"saida",valor:2200},{id:4,data:"15/01/25",desc:"Vendas semana",cat:"Venda",tipo:"entrada",valor:4320},{id:5,data:"18/01/25",desc:"Folha pgto",cat:"Salário",tipo:"saida",valor:3100},{id:6,data:"22/01/25",desc:"Vendas semana",cat:"Venda",tipo:"entrada",valor:3870},{id:7,data:"28/01/25",desc:"SIMPLES Nacional",cat:"Impostos",tipo:"saida",valor:890},{id:8,data:"30/01/25",desc:"Fechamento mês",cat:"Venda",tipo:"entrada",valor:2100},{id:9,data:"04/02/25",desc:"Compra estoque",cat:"Fornecedor",tipo:"saida",valor:1450},{id:10,data:"10/02/25",desc:"Vendas semana",cat:"Venda",tipo:"entrada",valor:4700},{id:11,data:"14/02/25",desc:"Conta energia",cat:"Energia",tipo:"saida",valor:380},{id:12,data:"20/02/25",desc:"Vendas semana",cat:"Venda",tipo:"entrada",valor:5100},{id:13,data:"25/02/25",desc:"Manutenção",cat:"Manutenção",tipo:"saida",valor:460},{id:14,data:"05/03/25",desc:"Vendas do dia",cat:"Venda",tipo:"entrada",valor:2200},{id:15,data:"10/03/25",desc:"Compra estoque",cat:"Fornecedor",tipo:"saida",valor:1800},{id:16,data:"15/03/25",desc:"Vendas semana",cat:"Venda",tipo:"entrada",valor:5600},{id:17,data:"20/03/25",desc:"Folha pgto",cat:"Salário",tipo:"saida",valor:3100},{id:18,data:"25/03/25",desc:"Anúncios",cat:"Marketing",tipo:"saida",valor:320},{id:19,data:"28/03/25",desc:"Vendas semana",cat:"Venda",tipo:"entrada",valor:4400},{id:20,data:"31/03/25",desc:"SIMPLES Nacional",cat:"Impostos",tipo:"saida",valor:920}],
  caixaFiltro:"todos"
};

function setState(fn){fn(state);render();}
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);
  });
  return el;
}

// ── COMPUTED ──────────────────────────────────────────────────────────────
function getKpis(){
  const fat=state.cmv.reduce((s,r)=>s+r.fat,0);
  const cmvT=state.cmv.reduce((s,r)=>s+r.custo,0);
  const cmvPct=fat>0?cmvT/fat:0;
  const perdaTotal=state.perdas.reduce((s,r)=>s+r.qtd*r.custo,0);
  return{fat,cmvPct,perdaTotal,margem:fat>0?1-cmvPct-perdaTotal/fat:0};
}
function getFluxo(){
  const entradas=state.caixa.filter(r=>r.tipo==="entrada").reduce((s,r)=>s+r.valor,0);
  const saidas=state.caixa.filter(r=>r.tipo==="saida").reduce((s,r)=>s+r.valor,0);
  return{entradas,saidas,saldo:entradas-saidas};
}
function getCmvByLoja(){
  const m={};
  state.cmv.forEach(r=>{if(!m[r.loja])m[r.loja]={fat:0,custo:0};m[r.loja].fat+=r.fat;m[r.loja].custo+=r.custo;});
  return Object.entries(m).map(([loja,v])=>({loja,cmv:v.fat>0?(v.custo/v.fat)*100:0}));
}
function getPerdasByTipo(){
  const m={};
  state.perdas.forEach(r=>{m[r.tipo]=(m[r.tipo]||0)+r.qtd*r.custo;});
  return Object.entries(m).map(([name,value])=>({name,value}));
}
function getTopProdutos(){
  const s=[...state.prods].sort((a,b)=>b.vendas-a.vendas);
  const tot=s.reduce((x,p)=>x+p.vendas,0);let acc=0;
  return s.map(p=>{acc+=p.vendas;return{...p,abc:acc/tot<=0.5?"A":acc/tot<=0.8?"B":"C"};});
}
function getPorMes(){
  const m={};
  state.caixa.forEach(r=>{const pts=r.data.split("/"),k=pts.length>=3?`${pts[1]}/${pts[2].slice(-2)}`:"?";if(!m[k])m[k]={mes:k,entradas:0,saidas:0};r.tipo==="entrada"?m[k].entradas+=r.valor:m[k].saidas+=r.valor;});
  return Object.values(m);
}
function getSaldoAcc(){
  const sorted=[...state.caixa].sort((a,b)=>{const pa=a.data.split("/"),pb=b.data.split("/");return new Date(`${pa[2]}-${pa[1]}-${pa[0]}`)-new Date(`${pb[2]}-${pb[1]}-${pb[0]}`);});
  let acc=0;return sorted.map(r=>{acc+=r.tipo==="entrada"?r.valor:-r.valor;return{data:r.data.slice(0,5),saldo:acc};});
}

// ── SVG CHARTS ────────────────────────────────────────────────────────────
function barChart(data,valueKey,labelKey,colorFn,h=160){
  const max=Math.max(...data.map(d=>d[valueKey]),1);
  const W=Math.min(window.innerWidth-50,440),bw=Math.min(44,Math.floor((W-40)/data.length)-8);
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width","100%");svg.setAttribute("height",h+36);svg.setAttribute("viewBox",`0 0 ${W} ${h+36}`);
  // grid lines
  [0.25,0.5,0.75,1].forEach(f=>{
    const y=h-f*h;const line=document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1","30");line.setAttribute("x2",W);line.setAttribute("y1",y);line.setAttribute("y2",y);
    line.setAttribute("stroke","#1C2E47");line.setAttribute("stroke-dasharray","3,3");svg.appendChild(line);
  });
  data.forEach((d,i)=>{
    const bh=Math.max((d[valueKey]/max)*h,2);
    const x=36+i*(bw+8),y=h-bh;
    const rect=document.createElementNS("http://www.w3.org/2000/svg","rect");
    rect.setAttribute("x",x);rect.setAttribute("y",y);rect.setAttribute("width",bw);rect.setAttribute("height",bh);
    rect.setAttribute("fill",colorFn(d,i));rect.setAttribute("rx","5");svg.appendChild(rect);
    // value label
    const vt=document.createElementNS("http://www.w3.org/2000/svg","text");
    vt.setAttribute("x",x+bw/2);vt.setAttribute("y",y-4);vt.setAttribute("text-anchor","middle");
    vt.setAttribute("fill","#4D6A96");vt.setAttribute("font-size","9");
    vt.textContent=typeof d[valueKey]==="number"&&d[valueKey]>99?`${d[valueKey].toFixed(0)}`:d[valueKey].toFixed(1);
    svg.appendChild(vt);
    // x label
    const lt=document.createElementNS("http://www.w3.org/2000/svg","text");
    lt.setAttribute("x",x+bw/2);lt.setAttribute("y",h+16);lt.setAttribute("text-anchor","middle");
    lt.setAttribute("fill","#4D6A96");lt.setAttribute("font-size","9");
    lt.textContent=(d[labelKey]||"").toString().slice(0,6);svg.appendChild(lt);
  });
  return svg;
}

function pieChart(data,size=140){
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  const cx=size/2,cy=size/2,r=size/2-8,ir=r*0.55;
  svg.setAttribute("width",size);svg.setAttribute("height",size);svg.setAttribute("viewBox",`0 0 ${size} ${size}`);
  const total=data.reduce((s,d)=>s+d.value,0);
  let angle=-Math.PI/2;
  data.forEach((d,i)=>{
    const slice=(d.value/total)*Math.PI*2;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+slice),y2=cy+r*Math.sin(angle+slice);
    const ix1=cx+ir*Math.cos(angle),iy1=cy+ir*Math.sin(angle);
    const ix2=cx+ir*Math.cos(angle+slice),iy2=cy+ir*Math.sin(angle+slice);
    const lg=slice>Math.PI?1:0;
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",`M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${lg},0 ${ix1},${iy1} Z`);
    path.setAttribute("fill",PIE_COLORS[i%4]);path.setAttribute("stroke","#06090F");path.setAttribute("stroke-width","2");
    svg.appendChild(path);angle+=slice;
  });
  return svg;
}

function areaChart(data,h=140){
  if(data.length<2)return h('div',{style:{height:h+"px"}});
  const W=Math.min(window.innerWidth-50,440);
  const vals=data.map(d=>d.saldo);
  const minV=Math.min(...vals),maxV=Math.max(...vals,1);
  const range=maxV-minV||1;
  const toY=(v)=>h-((v-minV)/range)*(h-16)+8;
  const toX=(i)=>16+(i/(data.length-1))*(W-32);
  const pts=data.map((d,i)=>`${toX(i)},${toY(d.saldo)}`).join(" ");
  const zero=toY(0);
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width","100%");svg.setAttribute("height",h+24);svg.setAttribute("viewBox",`0 0 ${W} ${h+24}`);
  // grid
  const gl=document.createElementNS("http://www.w3.org/2000/svg","line");
  gl.setAttribute("x1","0");gl.setAttribute("x2",W);gl.setAttribute("y1",Math.min(zero,h));gl.setAttribute("y2",Math.min(zero,h));
  gl.setAttribute("stroke","#1C2E47");gl.setAttribute("stroke-dasharray","4,4");svg.appendChild(gl);
  // area
  const area=document.createElementNS("http://www.w3.org/2000/svg","polygon");
  const areapts=`${toX(0)},${Math.min(zero,h)} ${pts} ${toX(data.length-1)},${Math.min(zero,h)}`;
  area.setAttribute("points",areapts);area.setAttribute("fill","rgba(0,212,168,0.15)");svg.appendChild(area);
  // line
  const line=document.createElementNS("http://www.w3.org/2000/svg","polyline");
  line.setAttribute("points",pts);line.setAttribute("fill","none");line.setAttribute("stroke","#00D4A8");line.setAttribute("stroke-width","2");line.setAttribute("stroke-linejoin","round");
  svg.appendChild(line);
  // labels
  [0,Math.floor(data.length/2),data.length-1].forEach(i=>{
    const t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",toX(i));t.setAttribute("y",h+18);t.setAttribute("text-anchor","middle");
    t.setAttribute("fill","#4D6A96");t.setAttribute("font-size","9");
    t.textContent=data[i].data;svg.appendChild(t);
  });
  return svg;
}

// ── COMPONENTS ────────────────────────────────────────────────────────────
function kpiCard(label,value,sub,dim,bc,textColor){
  return h('div',{className:"kpi-card",style:{background:dim,border:`1px solid ${bc}`}},
    h('div',{style:{fontSize:9,fontWeight:700,color:textColor||C.text2,letterSpacing:".07em",textTransform:"uppercase",marginBottom:8}},label),
    h('div',{className:"mono",style:{fontSize:14,fontWeight:700,color:textColor||C.text,lineHeight:1,wordBreak:"break-all"}},value),
    sub?h('div',{style:{fontSize:9,color:textColor||C.text2,marginTop:5}},sub):null
  );
}

function itemCard(borderColor,children){
  return h('div',{className:"card",style:{padding:"13px 14px",borderLeft:`3px solid ${borderColor}`,marginBottom:8}},children);
}

function delBtn(fn){return h('button',{className:"del-btn",onClick:fn},"🗑");}

function clearBtn(tab,label){
  return h('button',{className:"clear-btn",onClick:()=>setState(s=>{s.confirmPending=tab;})},
    "🗑️ Limpar "+label
  );
}

function confirmBox(tab,label,clearFn){
  if(state.confirmPending!==tab)return null;
  return h('div',{className:"confirm-box"},
    h('div',{className:"confirm-title"},"⚠️ Apagar todos os "+label+"?"),
    h('div',{style:{fontSize:12,color:"#4D6A96"}},"Essa ação não pode ser desfeita."),
    h('div',{className:"confirm-btns"},
      h('button',{className:"confirm-yes",onClick:()=>setState(s=>{clearFn(s);s.confirmPending=null;})},"Sim, apagar tudo"),
      h('button',{className:"confirm-no",onClick:()=>setState(s=>{s.confirmPending=null;})},"Cancelar")
    )
  );
}

function badge(label,color,dim){return h('span',{className:"badge",style:{color,background:dim}},label);}

// ── TABS ──────────────────────────────────────────────────────────────────
function renderDashboard(){
  const {fat,cmvPct,perdaTotal,margem}=getKpis();
  const {entradas,saidas,saldo}=getFluxo();
  const cmvByLoja=getCmvByLoja();
  const perdasByTipo=getPerdasByTipo();
  const topProdos=getTopProdutos();

  return h('div',{className:"page"},

  const save=()=>setState(s=>{
    const id=s.nextId++;
    if(s.modal==="cmv")s.cmv.push({id,loja:fm.loja||"Loja A",mes:fm.mes||"Abr/25",produto:fm.produto||"Produto",custo:+fm.custo||0,fat:+fm.fat||0});
    else if(s.modal==="perdas")s.perdas.push({id,loja:fm.loja||"Loja A",produto:fm.produto||"Produto",qtd:+fm.qtd||0,custo:+fm.custo||0,tipo:fm.tipo||"Erro"});
    else if(s.modal==="produtos")s.prods.push({id,nome:fm.nome||"Produto",vendas:+fm.vendas||0,custo:+fm.custo||0,cat:fm.cat||""});
    else if(s.modal==="caixa")s.caixa.push({id,data:fm.data||"01/04/25",desc:fm.desc||"Lançamento",cat:fm.cat||"Outros",tipo:fm.tipoCaixa||"entrada",valor:+fm.valor||0});
    s.modal=null;s.form={};
  });

  return h('div',{className:"modal-bg",onClick:(e)=>{if(e.target.className==="modal-bg")setState(s=>{s.modal=null;s.form={};})}},
    h('div',{className:"modal"},
      h('div',{className:"modal-handle"}),
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
        h('h3',{style:{margin:0,fontSize:16,fontWeight:700,color:C.text}},titles[state.modal]),
        h('button',{className:"close-btn",onClick:()=>setState(s=>{s.modal=null;s.form={};})},h('span',null,"✕"))
      ),
      ...fields,
      h('button',{className:"save-btn",onClick:save},"Salvar Registro")
    )
  );
}

// ── BOTTOM NAV ─────────────────────────────────────────────────────────────
const NAV_TABS=[
  {id:"dashboard",label:"Home",icon:"⊞"},
  {id:"cmv",label:"CMV",icon:"📊"},
  {id:"perdas",label:"Perdas",icon:"⚠️"},
  {id:"produtos",label:"Prods",icon:"📦"},
  {id:"caixa",label:"Caixa",icon:"💰"},
];

function renderNav(){
  return h('div',{className:"nav"},
    NAV_TABS.map(({id,label,icon})=>{
      const active=state.tab===id;
      return h('button',{className:"nav-btn",onClick:()=>setState(s=>{s.tab=id;})},
        active?h('div',{style:{width:18,height:2,background:C.teal,borderRadius:1,marginBottom:1}}):null,
        h('div',{style:{fontSize:18,lineHeight:1}},icon),
        h('span',{style:{fontSize:9,color:active?C.teal:C.text2,fontWeight:active?700:400}},label)
      );
    })
  );
}

// ── RENDER ────────────────────────────────────────────────────────────────
const {entradas:e0,saidas:s0,saldo:sl0}=getFluxo();
const subtitle={dashboard:"Visão Geral",cmv:"Custo da Mercadoria",perdas:"Controle de Perdas",produtos:"Curva ABC",caixa:"Fluxo de Caixa"};

function render(){
  const {entradas,saidas,saldo}=getFluxo();
  const app=document.getElementById("app");
  app.innerHTML="";

  // Header
  const hdr=h('div',{className:"hdr"},
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}},
      h('div',null,
        h('div',{style:{fontSize:9,color:C.text2,letterSpacing:".14em",textTransform:"uppercase",marginBottom:2,fontWeight:700}},subtitle[state.tab]),
        h('div',{style:{fontSize:19,fontWeight:700,color:C.text,letterSpacing:"-.5px"}},"Dashboard CMV")
      ),
      h('div',{style:{textAlign:"right"}},
        h('div',{style:{fontSize:9,color:C.text2,marginBottom:1}},"Saldo Caixa"),
        h('div',{className:"mono",style:{fontSize:13,fontWeight:700,color:saldo>=0?C.teal:C.red}},fmt(saldo))
      )
    )
  );
  app.appendChild(hdr);

  // Content
  const content=h('div',{style:{paddingBottom:82}});
  if(state.tab==="dashboard")content.appendChild(renderDashboard());
  else if(state.tab==="cmv")content.appendChild(renderCMV());
  else if(state.tab==="perdas")content.appendChild(renderPerdas());
  else if(state.tab==="produtos")content.appendChild(renderProdutos());
  else if(state.tab==="caixa")content.appendChild(renderCaixa());
  app.appendChild(content);

  // FAB
  if(state.tab!=="dashboard"){
    const fab=h('button',{className:"fab",onClick:()=>setState(s=>{s.modal=s.tab;s.form={};})},"＋");
    app.appendChild(fab);
  }

  // Nav
  app.appendChild(renderNav());

  // Modal
  const modal=renderModal();
  if(modal)app.appendChild(modal);
}

render();
</script>
</body>
