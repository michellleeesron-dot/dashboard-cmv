// ── PERSISTÊNCIA LOCAL ────────────────────────────────────────────────────
function salvarDados(){
  try{
    const dados={cmv:state.cmv,perdas:state.perdas,prods:state.prods,caixa:state.caixa,nextId:state.nextId};
    localStorage.setItem("dashboardCMV",JSON.stringify(dados));
    return true;
  }catch(e){return false;}
}
function carregarDados(){
  try{
    const raw=localStorage.getItem("dashboardCMV");
    if(!raw)return;
    const dados=JSON.parse(raw);
    if(dados.cmv)state.cmv=dados.cmv;
    if(dados.perdas)state.perdas=dados.perdas;
    if(dados.prods)state.prods=dados.prods;
    if(dados.caixa)state.caixa=dados.caixa;
    if(dados.nextId)state.nextId=dados.nextId;
  }catch(e){}
}
carregarDados();

function setState(fn){fn(state);render();}

function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(v===null||v===undefined||v===false)return;
    if(k==="style"&&typeof v==="object")Object.assign(el.style,v);
    else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="className")el.className=v;
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false||c===undefined)return;
    el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function getMeses(list){
  const s=new Set(list.map(r=>r.mes).filter(Boolean));
  return [...s].sort();
}
function getAllMeses(){
  const s=new Set([...state.cmv,...state.perdas,...state.caixa].map(r=>r.mes).filter(Boolean));
  return [...s].sort();
}
function filtrarPorMes(list,mes){
  if(mes==="Todos")return list;
  return list.filter(r=>r.mes===mes);
}

function getKpis(mes){
  const cmv=filtrarPorMes(state.cmv,mes);
  const perdas=filtrarPorMes(state.perdas,mes);
  const fat=cmv.reduce((s,r)=>s+r.fat,0);
  const cmvT=cmv.reduce((s,r)=>s+r.custo,0);
  const cmvPct=fat>0?cmvT/fat:0;
  const perdaTotal=perdas.reduce((s,r)=>s+r.qtd*r.custo,0);
  return{fat,cmvPct,perdaTotal,margem:fat>0?1-cmvPct-perdaTotal/fat:0};
}
function getFluxo(mes){
  const c=filtrarPorMes(state.caixa,mes);
  const entradas=c.filter(r=>r.tipo==="entrada").reduce((s,r)=>s+r.valor,0);
  const saidas=c.filter(r=>r.tipo==="saida").reduce((s,r)=>s+r.valor,0);
  return{entradas,saidas,saldo:entradas-saidas};
}
function getCmvByLoja(mes){
  const m={};
  filtrarPorMes(state.cmv,mes).forEach(r=>{if(!m[r.loja])m[r.loja]={fat:0,custo:0};m[r.loja].fat+=r.fat;m[r.loja].custo+=r.custo;});
  return Object.entries(m).map(([loja,v])=>({loja,cmv:v.fat>0?(v.custo/v.fat)*100:0}));
}
function getPerdasByTipo(mes){
  const m={};
  filtrarPorMes(state.perdas,mes).forEach(r=>{m[r.tipo]=(m[r.tipo]||0)+r.qtd*r.custo;});
  return Object.entries(m).map(([name,value])=>({name,value}));
}
function getTopProdutos(){
  const s=[...state.prods].sort((a,b)=>b.vendas-a.vendas);
  const tot=s.reduce((x,p)=>x+p.vendas,0);let acc=0;
  return s.map(p=>{acc+=p.vendas;return{...p,abc:acc/tot<=0.5?"A":acc/tot<=0.8?"B":"C"};});
}

// ── SVG CHARTS ────────────────────────────────────────────────────────────
function barChart(data,valueKey,labelKey,colorFn,ht=155){
  if(!data.length)return h('div',{style:{height:ht+"px",display:"flex",alignItems:"center",justifyContent:"center",color:C.text2,fontSize:12}},"Sem dados");
  const max=Math.max(...data.map(d=>d[valueKey]),1);
  const W=Math.min(window.innerWidth-60,420);
  const bw=Math.min(42,Math.floor((W-40)/data.length)-8);
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width","100%");svg.setAttribute("height",ht+34);svg.setAttribute("viewBox",`0 0 ${W} ${ht+34}`);
  [0.25,0.5,0.75,1].forEach(f=>{
    const y=ht-f*ht;const line=document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("x1","28");line.setAttribute("x2",W);line.setAttribute("y1",y);line.setAttribute("y2",y);
    line.setAttribute("stroke","#1C2E47");line.setAttribute("stroke-dasharray","3,3");svg.appendChild(line);
  });
  data.forEach((d,i)=>{
    const bh=Math.max((d[valueKey]/max)*ht,2);
    const x=34+i*(bw+8),y=ht-bh;
    const rect=document.createElementNS("http://www.w3.org/2000/svg","rect");
    rect.setAttribute("x",x);rect.setAttribute("y",y);rect.setAttribute("width",bw);rect.setAttribute("height",bh);
    rect.setAttribute("fill",colorFn(d,i));rect.setAttribute("rx","5");svg.appendChild(rect);
    const vt=document.createElementNS("http://www.w3.org/2000/svg","text");
    vt.setAttribute("x",x+bw/2);vt.setAttribute("y",y-4);vt.setAttribute("text-anchor","middle");
    vt.setAttribute("fill","#4D6A96");vt.setAttribute("font-size","9");
    vt.textContent=d[valueKey]>99?d[valueKey].toFixed(0):d[valueKey].toFixed(1);
    svg.appendChild(vt);
    const lt=document.createElementNS("http://www.w3.org/2000/svg","text");
    lt.setAttribute("x",x+bw/2);lt.setAttribute("y",ht+16);lt.setAttribute("text-anchor","middle");
    lt.setAttribute("fill","#4D6A96");lt.setAttribute("font-size","9");
    lt.textContent=(d[labelKey]||"").toString().slice(0,6);svg.appendChild(lt);
  });
  return svg;
}

function pieChart(data,size=130){
  if(!data.length)return h('div',{style:{width:size+"px",height:size+"px"}});
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  const cx=size/2,cy=size/2,r=size/2-8,ir=r*0.55;
  svg.setAttribute("width",size);svg.setAttribute("height",size);svg.setAttribute("viewBox",`0 0 ${size} ${size}`);
  const total=data.reduce((s,d)=>s+d.value,0);
  let angle=-Math.PI/2;
  data.forEach((d,i)=>{
    const slice=(d.value/total)*Math.PI*2;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    const x2=cx+r*Math.cos(angle+slice),y2=cy+r*Math.sin(angle+slice);
    const ix1=cx+ir*Math.cos(angle),iy1=cy+ir*Math.sin(angle);
    const ix2=cx+ir*Math.cos(angle+slice),iy2=cy+ir*Math.sin(angle+slice);
    const lg=slice>Math.PI?1:0;
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",`M${ix1},${iy1} L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} L${ix2},${iy2} A${ir},${ir} 0 ${lg},0 ${ix1},${iy1} Z`);
    path.setAttribute("fill",PIE_COLORS[i%4]);path.setAttribute("stroke","#06090F");path.setAttribute("stroke-width","2");
    svg.appendChild(path);angle+=slice;
  });
  return svg;
}

    sub?h('div',{style:{fontSize:9,color:textColor||C.text2,marginTop:5}},sub):null
  );
}

function delBtn(fn){return h('button',{className:"del-btn",onClick:fn},"🗑");}

function saveBtn(){
  return h('button',{className:"save-data-btn",onClick:()=>{
    const ok=salvarDados();
    if(ok){setState(s=>{s.saveToast=true;});setTimeout(()=>setState(s=>{s.saveToast=false;}),2500);}
  }},
    "💾  Salvar dados no celular"
  );
}

function tabHeader(title,count,confirmKey,clearFn){
  return [
    h('div',{className:"tab-hdr"},
      h('div',null,
        h('div',{className:"tab-title"},title),
        h('div',{style:{fontSize:11,color:C.text2,marginTop:2}},`${count} registro${count!==1?"s":""}`+(state.mesFiltro!=="Todos"?` em ${state.mesFiltro}`:""))
      ),
      count>0?h('button',{className:"clear-all-btn",onClick:()=>setState(s=>{s.confirmPending=s.confirmPending===confirmKey?null:confirmKey;})},
        "🗑️ Limpar tudo"
      ):null
    ),
    state.confirmPending===confirmKey?h('div',{className:"confirm-box"},
      h('div',{style:{fontSize:13,fontWeight:700,color:C.red}},"⚠️ Apagar todos os registros?"),
      h('div',{style:{fontSize:12,color:C.text2}},"Esta ação não pode ser desfeita."),
      h('div',{className:"confirm-btns"},
        h('button',{className:"confirm-yes",onClick:()=>setState(s=>{clearFn(s);s.confirmPending=null;})},"Sim, apagar tudo"),
        h('button',{className:"confirm-no",onClick:()=>setState(s=>{s.confirmPending=null;})},"Cancelar")
      )
    ):null
  ];
}

function mesFilterBar(meses){
  const all=["Todos",...meses];
  return h('div',{className:"filter-bar"},
    all.map(m=>h('button',{className:"mes-chip",onClick:()=>setState(s=>{s.mesFiltro=m;s.confirmPending=null;}),
      style:{background:state.mesFiltro===m?C.blue:C.card2||"#122038",color:state.mesFiltro===m?"#fff":C.text2,border:`1px solid ${state.mesFiltro===m?C.blue:"rgba(80,140,230,0.12)"}`}
    },m))
  );
}

function itemCard(borderColor,children){
  return h('div',{className:"card",style:{padding:"12px 13px",borderLeft:`3px solid ${borderColor}`,marginBottom:8}},children);
}

// ── CMV TAB ───────────────────────────────────────────────────────────────
function renderCMV(){
  const allMeses=getMeses(state.cmv);
  const lista=filtrarPorMes(state.cmv,state.mesFiltro);
  const fat=lista.reduce((s,r)=>s+r.fat,0),cmvT=lista.reduce((s,r)=>s+r.custo,0),cp=fat>0?cmvT/fat:0;

  const byMes={};
  lista.forEach(r=>{const m=r.mes||"Sem mês";if(!byMes[m])byMes[m]=[];byMes[m].push(r);});

  const renderItem=(r)=>{
    const p=r.fat>0?r.custo/r.fat:0,color=p>0.7?C.red:p>0.45?C.amber:C.teal;
    return itemCard(color,
      h('div',{style:{display:"flex",justifyContent:"space-between"}},

          h('div',{style:{display:"flex",alignItems:"center",gap:6,marginBottom:6,flexWrap:"wrap"}},

            badge(r.loja,C.blue,C.blueDim)

          h('div',{style:{display:"flex",gap:14}},

            h('div',null,h('div',{style:{fontSize:10,color:C.text2,marginBottom:2}},"CMV R$"),h('div',{className:"mono",style:{fontSize:11,color:C.text}},fmt(r.custo))),
            h('div',null,h('div',{style:{fontSize:10,color:C.text2,marginBottom:2}},"CMV %"),h('div',{className:"mono",style:{fontSize:15,fontWeight:700,color}},pct(p)))

        delBtn(()=>setState(s=>{s.cmv=s.cmv.filter(x=>x.id!==r.id);}))

    // Se filtro ativo, lista direto; se "Todos", agrupa por mês
    saveBtn(),
    state.mesFiltro!=="Todos"?
      h('div',null,...lista.map(renderItem))

      h('div',null,...Object.entries(byMes).map(([mes,items])=>{
        const mFat=items.reduce((s,r)=>s+r.fat,0),mCmv=items.reduce((s,r)=>s+r.custo,0);

  const allMeses=getMeses(state.caixa);
  const lista=filtrarPorMes(state.caixa,state.mesFiltro);
  const filtro=state.caixaFiltro;
  const entradas=lista.filter(r=>r.tipo==="entrada").reduce((s,r)=>s+r.valor,0);
  const saidas=lista.filter(r=>r.tipo==="saida").reduce((s,r)=>s+r.valor,0);
  const saldo=entradas-saidas;

  const porCat=Object.entries(lista.reduce((m,r)=>{m[r.cat]=(m[r.cat]||0)+r.valor;return m;},{})).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const byMes={};
  lista.forEach(r=>{const m=r.mes||"Sem mês";if(!byMes[m])byMes[m]=[];byMes[m].push(r);});

  const shown=[...lista.filter(r=>filtro==="todos"||r.tipo===filtro)].sort((a,b)=>{
    const pa=a.data.split("/"),pb=b.data.split("/");
    return new Date(`${pb[2]}-${pb[1]}-${pb[0]}`)-new Date(`${pa[2]}-${pa[1]}-${pa[0]}`);
  });

  const renderItem=(r)=>{
    const isE=r.tipo==="entrada";
    return itemCard(isE?C.teal:C.red,
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h('div',{style:{flex:1}},
          h('div',{style:{display:"flex",alignItems:"center",gap:6,marginBottom:5,flexWrap:"wrap"}},
            h('span',{style:{fontSize:13,fontWeight:600,color:C.text}},r.desc),
            badge(r.cat,isE?C.teal:C.red,isE?C.tealDim:C.redDim)
          ),
          h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h('span',{style:{fontSize:11,color:C.text2}},r.data),
            h('span',{className:"mono",style:{fontSize:15,fontWeight:700,color:isE?C.teal:C.red}},`${isE?"+":"−"}${fmt(r.valor)}`)
          )
        ),
        delBtn(()=>setState(s=>{s.caixa=s.caixa.filter(x=>x.id!==r.id);}))
      )
    );
  };

  return h('div',{className:"page"},
    ...tabHeader("Fluxo de Caixa",lista.length,"caixa",(s)=>{
      if(s.mesFiltro==="Todos")s.caixa=[];
      else s.caixa=s.caixa.filter(r=>r.mes!==s.mesFiltro);
      s.caixaFiltro="todos";
    }),
    allMeses.length>0?mesFilterBar(allMeses):null,

    // KPIs
    h('div',{className:"kpi3"},
      [{l:"ENTRADAS",v:fmt(entradas),c:C.teal,bg:C.tealDim,bc:"rgba(0,212,168,0.2)"},
       {l:"SAÍDAS",v:fmt(saidas),c:C.red,bg:C.redDim,bc:"rgba(255,71,104,0.2)"},
       {l:"SALDO",v:fmt(saldo),c:saldo>=0?C.teal:C.red,bg:saldo>=0?C.tealDim:C.redDim,bc:saldo>=0?"rgba(0,212,168,0.2)":"rgba(255,71,104,0.2)"}
      ].map(({l,v,c,bg,bc})=>h('div',{className:"kpi3-item",style:{background:bg,border:`1px solid ${bc}`}},
        h('div',{style:{fontSize:8,color:c,fontWeight:700,letterSpacing:".1em",marginBottom:5}},l),
        h('div',{className:"mono",style:{fontSize:11,fontWeight:700,color:c,wordBreak:"break-all"}},v)
      ))
    ),

    // Top cats
    porCat.length>0?h('div',{className:"card",style:{padding:"14px 16px"}},
      h('div',{style:{fontSize:10,color:C.text2,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",marginBottom:10}},"Top Categorias"),
      porCat.map(([cat,val],i)=>h('div',{style:{marginBottom:i<porCat.length-1?11:0}},
        h('div',{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
          h('span',{style:{fontSize:12,color:C.text}},cat),
          h('span',{className:"mono",style:{fontSize:12,fontWeight:700,color:C.text}},fmt(val))
        ),
        h('div',{className:"prog-bg"},h('div',{className:"prog-fill",style:{width:`${(val/porCat[0][1])*100}%`,background:BAR_COLORS[i%5]}}))
      ))
    ):null,

    saveBtn(),
    // Filtro tipo + lista
    h('div',null,
      h('div',{className:"filter-bar"},
        [{id:"todos",l:"Todos"},{id:"entrada",l:"⬇ Entradas"},{id:"saida",l:"⬆ Saídas"}].map(({id,l})=>
          h('button',{className:"filter-btn",onClick:()=>setState(s=>{s.caixaFiltro=id;}),
            style:{background:filtro===id?(id==="entrada"?C.teal:id==="saida"?C.red:C.blue):"#122038",color:filtro===id?"#001F18":C.text2,border:`1px solid ${filtro===id?(id==="entrada"?C.teal:id==="saida"?C.red:C.blue):"rgba(80,140,230,0.12)"}`}
          },l)
        )
      ),

      // Se "Todos" no filtro de mês, agrupa por mês
      state.mesFiltro==="Todos"&&filtro==="todos"?
        h('div',null,...Object.entries(byMes).sort((a,b)=>b[0].localeCompare(a[0])).map(([mes,items])=>{
          const mE=items.filter(r=>r.tipo==="entrada").reduce((s,r)=>s+r.valor,0);
          const mS=items.filter(r=>r.tipo==="saida").reduce((s,r)=>s+r.valor,0);
          const mSaldo=mE-mS;
          return h('div',{className:"month-section",style:{marginBottom:10}},
            h('div',{className:"month-hdr",onClick:()=>setState(s=>{s.expandedMonths["caixa_"+mes]=!s.expandedMonths["caixa_"+mes];})},
              h('div',null,h('div',{className:"month-hdr-title"},mes),h('div',{style:{fontSize:10,color:C.text2,marginTop:2}},`${items.length} lançamento(s)`)),
              h('div',{style:{textAlign:"right"}},h('div',{className:"month-hdr-val",style:{color:mSaldo>=0?C.teal:C.red}},fmt(mSaldo)),h('div',{style:{fontSize:10,color:C.text2}},"saldo"),h('div',{style:{fontSize:14,color:C.text2}},state.expandedMonths["caixa_"+mes]?"▲":"▼"))
            ),
            state.expandedMonths["caixa_"+mes]?h('div',{className:"month-body"},
              h('div',{style:{display:"flex",gap:8,marginBottom:8}},
                h('div',{style:{flex:1,background:C.tealDim,borderRadius:8,padding:"8px"}},h('div',{style:{fontSize:8,color:C.teal,fontWeight:700,marginBottom:3}},"ENTRADAS"),h('div',{className:"mono",style:{fontSize:11,fontWeight:700,color:C.teal}},fmt(mE))),
                h('div',{style:{flex:1,background:C.redDim,borderRadius:8,padding:"8px"}},h('div',{style:{fontSize:8,color:C.red,fontWeight:700,marginBottom:3}},"SAÍDAS"),h('div',{className:"mono",style:{fontSize:11,fontWeight:700,color:C.red}},fmt(mS)))
              ),
              ...items.sort((a,b)=>b.data.localeCompare(a.data)).map(renderItem)
            ):null
          );
        }))
      :
        h('div',null,
          shown.length===0?h('div',{style:{textAlign:"center",color:C.text2,padding:"40px 0",fontSize:13}},"Nenhum lançamento."):null,
          ...shown.map(renderItem)
        )
    )
  );
}

// ── MODAL ─────────────────────────────────────────────────────────────────
function renderModal(){
  if(!state.modal)return null;
  const f=(k,v)=>setState(s=>{s.form={...s.form,[k]:v};});
  const fm=state.form;
  const inp={width:"100%",background:"#122038",border:"1px solid rgba(80,140,230,0.15)",borderRadius:10,padding:"12px 14px",color:"#DDE9FF",fontSize:15,outline:"none",display:"block",marginBottom:2};
  const Lbl=(t)=>h('label',{className:"field-lbl"},t);
  const Sel=(name,k,opts)=>h('div',{style:{marginBottom:12}},Lbl(name),h('select',{style:inp,onChange:(e)=>f(k,e.target.value),value:fm[k]||""},h('option',{value:""},"Selecionar..."),opts.map(o=>h('option',{value:o},o))));
  const Inp=(name,k,type="text")=>h('div',{style:{marginBottom:12}},Lbl(name),h('input',{style:inp,type,value:fm[k]||"",onInput:(e)=>f(k,e.target.value),placeholder:type==="number"?"0,00":"",inputMode:type==="number"?"decimal":"text"}));
  const titles={cmv:"Lançamento CMV",perdas:"Registrar Perda",produtos:"Cadastrar Produto",caixa:"Lançamento de Caixa"};
  let fields=[];
  if(state.modal==="cmv"){
    fields=[Sel("Loja","loja",LOJAS),Sel("Mês","mes",MESES),Inp("Produto","produto"),Inp("Custo (R$)","custo","number"),Inp("Faturamento (R$)","fat","number")];
    if(fm.custo&&fm.fat&&+fm.fat>0)fields.push(h('div',{className:"preview-box",style:{background:"#122038",border:"1px solid rgba(80,140,230,0.15)",marginBottom:12}},h('div',{style:{fontSize:11,color:C.text2,marginBottom:4}},"CMV calculado"),h('div',{className:"mono",style:{fontSize:22,fontWeight:700,color:(+fm.custo/+fm.fat)>0.7?C.red:C.teal}},pct(+fm.custo/+fm.fat))));
  }
  if(state.modal==="perdas"){
    fields=[Sel("Loja","loja",LOJAS),Sel("Mês","mes",MESES),Inp("Produto","produto"),Inp("Quantidade","qtd","number"),Inp("Custo Unit. (R$)","custo","number"),Sel("Tipo de Perda","tipo",TIPOS_P)];
    if(fm.qtd&&fm.custo)fields.push(h('div',{className:"preview-box",style:{background:C.redDim,border:"1px solid rgba(255,71,104,0.2)",marginBottom:12}},h('div',{style:{fontSize:11,color:C.red,marginBottom:4}},"Total da Perda"),h('div',{className:"mono",style:{fontSize:22,fontWeight:700,color:C.red}},fmt(+fm.qtd*+fm.custo))));
  }
  if(state.modal==="produtos"){
    fields=[Inp("Nome","nome"),Inp("Vendas (R$)","vendas","number"),Inp("Custo (R$)","custo","number"),Inp("Categoria","cat")];
    if(fm.vendas&&fm.custo&&+fm.vendas>0)fields.push(h('div',{className:"preview-box",style:{background:C.tealDim,border:"1px solid rgba(0,212,168,0.2)",marginBottom:12}},h('div',{style:{fontSize:11,color:C.teal,marginBottom:4}},"Margem"),h('div',{className:"mono",style:{fontSize:22,fontWeight:700,color:C.teal}},pct((+fm.vendas-+fm.custo)/+fm.vendas))));
  }
  if(state.modal==="caixa"){
    fields=[
      h('div',{style:{marginBottom:12}},Lbl("Tipo"),
        h('div',{className:"tipo-toggle"},
          ["entrada","saida"].map(t=>h('button',{className:"tipo-btn",onClick:()=>f("tipoCaixa",t),style:{border:`1px solid ${fm.tipoCaixa===t?(t==="entrada"?C.teal:C.red):"rgba(80,140,230,0.15)"}`,background:fm.tipoCaixa===t?(t==="entrada"?C.tealDim:C.redDim):"#122038",color:fm.tipoCaixa===t?(t==="entrada"?C.teal:C.red):C.text2}},t==="entrada"?"⬇ Entrada":"⬆ Saída"))
        )
      ),
      Inp("Descrição","desc"),Sel("Mês","mes",MESES),Inp("Data (DD/MM/AAAA)","data"),
      Sel("Categoria","cat",fm.tipoCaixa==="saida"?CAT_S:CAT_E),
      Inp("Valor (R$)","valor","number")
    ];
    if(fm.valor&&+fm.valor>0)fields.push(h('div',{className:"preview-box",style:{background:fm.tipoCaixa==="saida"?C.redDim:C.tealDim,border:`1px solid ${fm.tipoCaixa==="saida"?"rgba(255,71,104,0.2)":"rgba(0,212,168,0.2)"}`,marginBottom:12}},h('div',{style:{fontSize:11,color:fm.tipoCaixa==="saida"?C.red:C.teal,marginBottom:4}},fm.tipoCaixa==="saida"?"Saída":"Entrada"," confirmada"),h('div',{className:"mono",style:{fontSize:22,fontWeight:700,color:fm.tipoCaixa==="saida"?C.red:C.teal}},`${fm.tipoCaixa==="saida"?"−":"+"} ${fmt(+fm.valor)}`)));
  }
  const save=()=>setState(s=>{
    const id=s.nextId++;
    if(s.modal==="cmv")s.cmv.push({id,loja:fm.loja||"Loja A",mes:fm.mes||"Abr/25",produto:fm.produto||"Produto",custo:+fm.custo||0,fat:+fm.fat||0});
    else if(s.modal==="perdas")s.perdas.push({id,loja:fm.loja||"Loja A",mes:fm.mes||"Abr/25",produto:fm.produto||"Produto",qtd:+fm.qtd||0,custo:+fm.custo||0,tipo:fm.tipo||"Erro"});
    else if(s.modal==="produtos")s.prods.push({id,nome:fm.nome||"Produto",vendas:+fm.vendas||0,custo:+fm.custo||0,cat:fm.cat||""});
    else if(s.modal==="caixa")s.caixa.push({id,mes:fm.mes||"Abr/25",data:fm.data||"01/04/25",desc:fm.desc||"Lançamento",cat:fm.cat||"Outros",tipo:fm.tipoCaixa||"entrada",valor:+fm.valor||0});
    s.modal=null;s.form={};
  });
  return h('div',{className:"modal-bg",onClick:(e)=>{if(e.target.className==="modal-bg")setState(s=>{s.modal=null;s.form={};})}},
    h('div',{className:"modal"},
      h('div',{className:"modal-handle"}),
      h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
        h('h3',{style:{margin:0,fontSize:16,fontWeight:700,color:C.text}},titles[state.modal]),
        h('button',{className:"close-btn",onClick:()=>setState(s=>{s.modal=null;s.form={};})},"✕")
      ),
      ...fields,
      h('button',{className:"save-btn",onClick:save},"Salvar Registro")
    )
  );
}

// ── BOTTOM NAV ─────────────────────────────────────────────────────────────
const NAV_TABS=[
  {id:"dashboard",label:"Home",icon:"⊞"},
  {id:"cmv",label:"CMV",icon:"📊"},
  {id:"perdas",label:"Perdas",icon:"⚠️"},
  {id:"produtos",label:"Prods",icon:"📦"},
  {id:"caixa",label:"Caixa",icon:"💰"},
];

function render(){
  const {entradas,saidas,saldo}=getFluxo(state.mesFiltro);
  const subtitle={dashboard:"Visão Geral",cmv:"Custo da Mercadoria",perdas:"Controle de Perdas",produtos:"Curva ABC",caixa:"Fluxo de Caixa"};
  const app=document.getElementById("app");
  app.innerHTML="";

  app.appendChild(h('div',{className:"hdr"},
    h('div',{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-end"}},
      h('div',null,
        h('div',{style:{fontSize:9,color:C.text2,letterSpacing:".14em",textTransform:"uppercase",marginBottom:2,fontWeight:700}},subtitle[state.tab]+(state.mesFiltro!=="Todos"?` · ${state.mesFiltro}`:"")),
        h('div',{style:{fontSize:19,fontWeight:700,color:C.text,letterSpacing:"-.5px"}},"Dashboard CMV")
      ),
      h('div',{style:{textAlign:"right"}},
        h('div',{style:{fontSize:9,color:C.text2,marginBottom:1}},"Saldo Caixa"),
        h('div',{className:"mono",style:{fontSize:13,fontWeight:700,color:saldo>=0?C.teal:C.red}},fmt(saldo))
      )
    )
  ));

  const content=h('div',{style:{paddingBottom:82}});
  if(state.tab==="dashboard")content.appendChild(renderDashboard());
  else if(state.tab==="cmv")content.appendChild(renderCMV());
  else if(state.tab==="perdas")content.appendChild(renderPerdas());
  else if(state.tab==="produtos")content.appendChild(renderProdutos());
  else if(state.tab==="caixa")content.appendChild(renderCaixa());
  app.appendChild(content);

  if(state.tab!=="dashboard"){
    app.appendChild(h('button',{className:"fab",onClick:()=>setState(s=>{s.modal=s.tab;s.form={};})},"＋"));
  }

  app.appendChild(h('div',{className:"nav"},
    NAV_TABS.map(({id,label,icon})=>{
      const active=state.tab===id;
      return h('button',{className:"nav-btn",onClick:()=>setState(s=>{s.tab=id;s.confirmPending=null;})},
        active?h('div',{style:{width:18,height:2,background:C.teal,borderRadius:1,marginBottom:1}}):null,
        h('div',{style:{fontSize:18,lineHeight:1,color:active?C.teal:C.text2}},icon),
        h('span',{style:{fontSize:9,color:active?C.teal:C.text2,fontWeight:active?700:400}},label)
      );
    })
  ));

  const modal=renderModal();
  if(modal)app.appendChild(modal);

  // Toast
  if(state.saveToast){
    app.appendChild(h('div',{className:"toast"},"✅  Dados salvos com sucesso!"));
  }
}

render();
</script>
</body>
